<!DOCTYPE html>
<html lang="no">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking – Simonsen Fjord & Fest</title>
    <link rel="stylesheet" href="style.css?v=103">
    <link rel="icon" type="image/png" href="logo.png">
</head>

<body>

<header>
    <div class="header-container">
        <a href="index.html">
            <img src="logo.png" alt="Simonsen Fjord & Fest logo" class="logo">
        </a>
        <nav id="hoved-nav">
            <a href="index.html">Hjem</a>
            <a href="booking.html">Booking</a>
            <a href="vilkar.html">Avtalevilkår</a>
            <a href="index.html#kontakt">Kontakt</a>
            <button class="hamburger" id="hamburger" aria-label="Åpne meny" onclick="toggleMeny()">
                <span></span><span></span><span></span>
            </button>
        </nav>
    </div>
</header>

<div class="mobil-meny" id="mobil-meny">
    <a href="index.html" onclick="lukkMeny()">Hjem</a>
    <a href="booking.html" onclick="lukkMeny()">Booking</a>
    <a href="vilkar.html" onclick="lukkMeny()">Avtalevilkår</a>
    <a href="index.html#kontakt" onclick="lukkMeny()">Kontakt</a>
</div>

<main>
    <section class="booking">
        <h2>Reserver utstyr</h2>
        <p class="faq-ingress">Fyll ut skjemaet så hører du fra oss innen kort tid for bekreftelse.</p>
        <div class="form-container">
            <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSeJ1NwCAgeGAP1cgTiKZZ97Vq84YnXp29dSpPSjsWS5ziYUJQ/viewform?embedded=true"
                width="100%" height="900" frameborder="0"></iframe>
        </div>
    </section>
</main>

<footer id="kontakt">
    <p>© 2026 Simonsen Fjord & Fest – Stavanger</p>
    <p>E-post: <a href="mailto:simonsen.andreas@gmail.com">simonsen.andreas@gmail.com</a> | Telefon: <a href="tel:+4795213090">+47 95 21 30 90</a></p>
</footer>

<script>
    function toggleMeny() {
        document.getElementById('mobil-meny').classList.toggle('aapen');
        document.getElementById('hamburger').classList.toggle('aapen');
    }
    function lukkMeny() {
        document.getElementById('mobil-meny').classList.remove('aapen');
        document.getElementById('hamburger').classList.remove('aapen');
    }
    document.addEventListener('click', function (e) {
        const meny = document.getElementById('mobil-meny');
        const btn  = document.getElementById('hamburger');
        if (meny.classList.contains('aapen') && !meny.contains(e.target) && !btn.contains(e.target)) {
            lukkMeny();
        }
    });
</script>

</body>
</html>
