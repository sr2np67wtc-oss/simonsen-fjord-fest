<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simonsen Fjord & Fest – Utleie av lydutstyr</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="logo.png">

  <!-- FullCalendar -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>

  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; }

    .calendar {
      max-width: 520px;
      margin: 30px auto;
      text-align: center;
      background-color: #fafafa;
      padding: 12px;
      border-radius: 10px;
      box-shadow: 0 0 8px rgba(0,0,0,0.08);
    }

    #utleieKalender {
      background-color: #fff;
      border-radius: 10px;
      padding: 10px;
    }

    .fc-daygrid-day {
      background-color: #e8fbe8 !important;
    }

    .fc-event {
      background-color: #ff4d4d !important;
      border: none !important;
    }
  </style>
</head>

<body>

<header>
  <div class="header-container">
    <img src="logo.png" alt="Simonsen Fjord & Fest logo" class="logo">

    <nav>
      <a href="#utleie">Utleie</a>
      <a href="#kalender">Tilgjengelighet</a>
      <a href="#booking">Booking</a>
      <a href="vilkar.html">Avtalevilkår</a>
      <a href="#kontakt">Kontakt</a>
    </nav>
  </div>
</header>

<section id="kalender" class="calendar">
  <h2>Tilgjengelighet</h2>
  <p>Grønn = ledig • Rød = opptatt</p>
  <div id="utleieKalender"></div>
</section>

<section id="booking" class="booking">
  <h2>Reserver utstyr</h2>

  <div class="form-container">
    <iframe 
      src="https://docs.google.com/forms/d/e/1FAIpQLSeJ1NwCAgeGAP1cgTiKZZ97Vq84YnXp29dSpPSjsWS5ziYUJQ/viewform?embedded=true"
      width="100%" height="900" frameborder="0">
    </iframe>
  </div>
</section>

<footer id="kontakt">
  <p>© 2026 Simonsen Fjord & Fest – Stavanger</p>
  <p>E-post: <a href="mailto:simonsen.andreas@gmail.com">simonsen.andreas@gmail.com</a> | Telefon: <a href="tel:+4795213090">+47 95 21 30 90</a></p>
</footer>

<script>
document.addEventListener('DOMContentLoaded', async function() {
  const calendarEl = document.getElementById('utleieKalender');

  const calendar = new FullCalendar.Calendar(calendarEl, {
    initialView: 'dayGridMonth',
    locale: 'no',
    firstDay: 1,
    weekNumbers: true,
    height: 'auto',

    events: async function(fetchInfo, successCallback, failureCallback) {
      try {
        const csvUrl =
          "https://docs.google.com/spreadsheets/d/e/2PACX-1vRPBUWpbOokMYOE4hg8yWOCKRqrKcRYTlAQkiNEX9jj1cZh6l780N3HmYRtKYn5cDu9RMz83SvTtZvb/pub?output=csv&gid=1158072166";

        const res = await fetch(csvUrl);
        const csv = await res.text();
        const rows = csv.split("\n").map(r => r.split(","));

        let events = [];

        function convertDate(d) {
          if (!d) return null;
          const parts = d.trim().split(".");
          if (parts.length !== 3) return null;
          const day = parts[0].padStart(2, "0");
          const month = parts[1].padStart(2, "0");
          const year = parts[2];
          return `${year}-${month}-${day}`;
        }

        for (let i = 1; i < rows.length; i++) {
          const title = rows[i][0]?.trim();
          const startRaw = rows[i][1]?.trim();
          const endRaw = rows[i][2]?.trim();

          if (!startRaw) continue;

          const start = convertDate(startRaw);
          const end = convertDate(endRaw || startRaw);

          if (!start) continue;

          events.push({
            title: title || "Opptatt",
            start: start,
            end: end + "T23:59:59",
            color: "#ff4d4d"
          });
        }

        successCallback(events);

      } catch (err) {
        console.error("Feil ved henting av CSV:", err);
        failureCallback(err);
      }
    }
  });

  calendar.render();
});
</script>

</body>
</html>
